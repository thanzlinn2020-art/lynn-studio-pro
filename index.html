<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Master Content Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@900&display=swap');
        
        :root { --primary: #f97316; --accent: #ef4444; }
        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            background: radial-gradient(circle at top right, #111827, #000000);
            color: #f8fafc; margin: 0; min-height: 100vh;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 2rem; 
        }
        .neon-btn { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.2); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(249, 115, 22, 0.4); }
        .history-item { 
            background: rgba(255, 255, 255, 0.03); border-left: 4px solid var(--primary); 
            border-radius: 12px; transition: 0.3s;
        }
    </style>
</head>
<body class="flex flex-col items-center p-4 md:p-10">

    <div class="w-full max-w-3xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600 mb-4" style="font-family: 'Inter';">
                LYNN STUDIO
            </h1>
            <p class="text-[10px] tracking-[0.5em] text-slate-600 uppercase font-black">AI Cinema & Viral Script Engine</p>
        </header>

        <section class="glass-card p-6 md:p-10 mb-12 shadow-2xl">
            <textarea id="topicInput" rows="2" placeholder="ဥပမာ - ဘဝသင်ခန်းစာ..." 
                class="w-full bg-black/40 border border-white/5 rounded-2xl p-6 text-lg md:text-xl text-white outline-none focus:border-orange-500 transition-all text-center"></textarea>
            
            <button onclick="generateScript()" id="genBtn" class="neon-btn w-full mt-8 py-5 rounded-2xl font-black text-xs md:text-sm uppercase tracking-[0.3em] active:scale-95">
                Launch Script 🎬
            </button>
        </section>

        <div id="loader" class="hidden text-center my-10 animate-pulse">
            <div class="inline-block w-8 h-8 border-4 border-orange-500/10 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] text-orange-500 font-bold uppercase tracking-widest">AI is directing your scene...</p>
        </div>

        <main id="resultArea" class="hidden space-y-8 mb-20">
            <div class="glass-card p-8 md:p-12 border-l-4 border-l-orange-500">
                <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                    <span class="text-[9px] font-black uppercase text-orange-500 tracking-widest italic">Engine: Master AI</span>
                    <button onclick="copyScript()" class="text-[9px] font-black bg-white/5 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-lg transition-all uppercase">Copy ✅</button>
                </div>
                <div id="mainOutput" class="text-xl md:text-2xl leading-[2.6] text-slate-200 font-medium italic whitespace-pre-line"></div>
            </div>
        </main>

        <section class="space-y-6">
            <div class="flex justify-between items-center px-2">
                <h2 class="text-[11px] font-black text-slate-600 uppercase tracking-[0.3em]">Recent History</h2>
                <button onclick="clearHistory()" class="text-[9px] text-red-500/50 hover:text-red-500 font-bold uppercase">Clear</button>
            </div>
            <div id="historyList" class="space-y-4"></div>
        </section>
    </div>

    <script>
        const API_KEY = "AIzaSyAeKPEvkZ-GWezN0RhyIGOtvbqmOi16eSE"; 

        window.onload = loadHistory;

        async function generateScript() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('mainOutput');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Storyteller ပါ။ Topic: "${topic}" အတွက် TikTok Script တစ်ခုကို [00:00] timestamp format နဲ့ မြန်မာလို ရေးပေးပါ။` }] }]
                    })
                });
                const data = await response.json();
                const script = data.candidates[0].content.parts[0].text;
                
                output.innerText = script;
                resArea.classList.remove('hidden');
                saveHistory(topic, script);
            } catch (e) {
                alert("VPN (Singapore/USA) ချိတ်ဖို့ လိုအပ်ပါတယ်ဗျာ။");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function saveHistory(title, content) {
            let history = JSON.parse(localStorage.getItem('lynn_v22') || "[]");
            history.unshift({ title, content, date: new Date().toLocaleTimeString() });
            localStorage.setItem('lynn_v22', JSON.stringify(history.slice(0, 5)));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('lynn_v22') || "[]");
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(item => `
                <div class="p-5 history-item">
                    <p class="text-[11px] font-black text-orange-500 uppercase">${item.title} <span class="text-slate-800 ml-2">${item.date}</span></p>
                    <p class="text-xs text-slate-400 line-clamp-1 italic mt-2">${item.content}</p>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("History အားလုံးကို ဖျက်မှာလား?")) {
                localStorage.removeItem('lynn_v22');
                loadHistory();
            }
        }

        function copyScript() {
            const text = document.getElementById('mainOutput').innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကို Copy ယူလိုက်ပါပြီ! ✅");
        }
    </script>
</body>
</html>
