<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lynn Studio | Master TikTok Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Inter:wght@900&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #020617; color: #f8fafc; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2rem; }
        .neon-btn { background: linear-gradient(135deg, #f97316, #ef4444); box-shadow: 0 0 25px rgba(249, 115, 22, 0.2); }
        .history-item { border-left: 3px solid #f97316; transition: 0.3s; background: rgba(255,255,255,0.01); }
        .history-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-3xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-600 mb-2" style="font-family: 'Inter';">LYNN STUDIO</h1>
            <p class="text-[9px] tracking-[0.6em] text-slate-600 uppercase font-black">AI Cinema & Viral Script Engine</p>
        </header>

        <section class="glass-card p-6 md:p-10 mb-10 border-t border-white/5 shadow-2xl">
            <textarea id="topicInput" rows="2" placeholder="ဥပမာ - ဘဝအောင်မြင်ရေး လျှို့ဝှက်ချက်..." 
                class="w-full bg-black/40 border border-white/5 rounded-2xl p-6 text-lg md:text-xl text-white outline-none focus:border-orange-500 transition-all text-center placeholder:text-slate-800"></textarea>
            
            <button onclick="masterGenerate()" id="genBtn" class="neon-btn w-full mt-8 py-5 rounded-2xl font-black text-xs uppercase tracking-[0.3em] active:scale-95 transition-all">
                Launch Script 🎬
            </button>
        </section>

        <div id="loader" class="hidden text-center my-10 animate-pulse">
            <div class="inline-block w-8 h-8 border-4 border-orange-500/10 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="mt-4 text-[10px] text-orange-500 font-bold uppercase tracking-widest">AI is directing your scene...</p>
        </div>

        <main id="resultArea" class="hidden space-y-8 mb-16">
            <div class="glass-card p-8 md:p-12 relative overflow-hidden border-l-4 border-l-orange-500">
                <div class="flex justify-between items-center mb-8 border-b border-white/5 pb-4">
                    <span id="engineBadge" class="text-[9px] font-black uppercase text-orange-500 tracking-widest italic">Engine: Gemini 3</span>
                    <button onclick="copyToClipboard('mainOutput')" class="text-[10px] font-black bg-white/5 hover:bg-orange-500 hover:text-black px-4 py-2 rounded-lg transition-all uppercase">Copy Script ✅</button>
                </div>
                <div id="mainOutput" class="text-xl md:text-2xl leading-[2.6] text-slate-200 font-medium italic whitespace-pre-line"></div>
            </div>
        </main>

        <section class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-600 uppercase tracking-widest">Recent History</h2>
            <div id="historyList" class="space-y-3"></div>
        </section>
    </div>

    <script>
        const API_KEY = "AIzaSyAeKPEvkZ-GWezN0RhyIGOtvbqmOi16eSE"; 

        window.onload = loadHistory;

        async function masterGenerate() {
            const topic = document.getElementById('topicInput').value;
            if(!topic) return;

            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const resArea = document.getElementById('resultArea');
            const output = document.getElementById('mainOutput');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resArea.classList.add('hidden');

            // --- Attempt 1: Gemini 3 Flash ---
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `မင်းက Lynn Movie Talks ရဲ့ Elite Director ပါ။ Topic: "${topic}" အတွက် TikTok Script တစ်ခုကို [00:00] timestamp format နဲ့ မြန်မာလို ရေးပေးပါ။` }] }]
                    })
                });
                const data = await response.json();
                if(data.candidates) {
                    displayResult(data.candidates[0].content.parts[0].text, "Gemini Elite", topic);
                    return;
                }
            } catch (e) { console.log("Gemini failed, trying backup..."); }

            // --- Attempt 2: Pollinations AI (Backup) ---
            try {
                const prompt = encodeURIComponent(`Write a cinematic TikTok script for: ${topic} in Myanmar language with timestamps [00:00]. Emotional tone.`);
                const response = await fetch(`https://text.pollinations.ai/${prompt}?model=openai`);
                const text = await response.text();
                if(text) {
                    displayResult(text, "DeepSea Backup", topic);
                }
            } catch (e) {
                alert("🚨 Servers အားလုံး အလုပ်များနေပါတယ်။ ခဏနေမှ ပြန်စမ်းကြည့်ပါ Linn!");
            } finally {
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function displayResult(text, engine, title) {
            document.getElementById('mainOutput').innerText = text;
            document.getElementById('engineBadge').innerText = "Engine: " + engine;
            document.getElementById('resultArea').classList.remove('hidden');
            saveHistory(title, text);
        }

        function saveHistory(title, content) {
            let history = JSON.parse(localStorage.getItem('lynn_v20') || "[]");
            history.unshift({ title, content, date: new Date().toLocaleTimeString() });
            localStorage.setItem('lynn_v20', JSON.stringify(history.slice(0, 5)));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('lynn_v20') || "[]");
            document.getElementById('historyList').innerHTML = history.map(item => `
                <div class="glass-card p-4 history-item">
                    <p class="text-[10px] font-black text-orange-500 uppercase">${item.title} <span class="text-slate-700 font-normal ml-2">${item.date}</span></p>
                    <p class="text-xs text-slate-400 line-clamp-1 italic mt-1">${item.content}</p>
                </div>
            `).join('');
        }

        function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Script ကို Copy ယူလိုက်ပါပြီ! ✅");
        }
    </script>
</body>
</html>
