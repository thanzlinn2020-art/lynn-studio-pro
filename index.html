<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<title>Myanmar News</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:sans-serif;margin:0;background:#f4f4f4}
header{background:red;color:white;text-align:center;padding:15px}
.news{background:white;margin:10px;padding:15px;border-radius:10px;cursor:pointer}
</style>
</head>

<body>

<header>
  <h2>Myanmar News Daily</h2>
</header>

<div id="news"></div>

<script>
// 👉 NEWS DATA (ဒီမှာပဲအရေးကြီး)
const newsData = [
  "မြန်မာနိုင်ငံ နောက်ဆုံးသတင်းများ",
  "စီးပွားရေး အခြေအနေ update",
  "နည်းပညာသတင်းအသစ်များ",
  "ကျန်းမာရေး သတင်းများ"
];

const box = document.getElementById("news");

// 👉 SHOW NEWS
newsData.forEach(item => {
  const div = document.createElement("div");
  div.className = "news";
  div.innerText = item;
  box.appendChild(div);
});

console.log("News loaded OK");
</script>

</body>
</html>
